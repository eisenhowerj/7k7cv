name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  validate:
    name: Validate Infrastructure & Site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js (for CDK CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        run: uv sync --no-dev --frozen

      - name: CDK Synth
        run: uv run cdk synth

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_READONLY_ROLE_ARN }}
          aws-region: us-east-1

      - name: CDK Diff
        id: cdk_diff
        run: |
          set +e
          DIFF_OUTPUT=$(uv run cdk diff 2>&1)
          DIFF_EXIT=$?
          set -e
          echo "diff_output<<DIFF_EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "DIFF_EOF" >> "$GITHUB_OUTPUT"
          exit $DIFF_EXIT

      - name: Post CDK Diff as PR comment
        if: always() && steps.cdk_diff.conclusion != 'skipped'
        uses: actions/github-script@v7
        env:
          DIFF_OUTPUT: ${{ steps.cdk_diff.outputs.diff_output }}
          DIFF_OUTCOME: ${{ steps.cdk_diff.outcome }}
        with:
          script: |
            const diffOutput = process.env.DIFF_OUTPUT;
            const status = process.env.DIFF_OUTCOME === 'success' ? '✅' : '⚠️';
            const body = [
              `## ${status} CDK Diff`,
              '',
              '```',
              diffOutput,
              '```',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('CDK Diff')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  html-validation:
    name: HTML Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate index.html
        run: html-validate index.html

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress index.html
          fail: true
